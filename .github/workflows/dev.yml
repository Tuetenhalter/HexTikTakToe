name: TypeScript Type Check

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  Type_Check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "npm"

      - name: Install dependencies
        run: npm ci 

      - name: Type Check
        run: npm run build