name: TypeScript CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "npm" # Speeds up future runs by caching node_modules

      - name: Install dependencies
        run: npm ci # 'npm ci' is faster and more reliable than 'npm install' in CI

      - name: Build
        run: npm run build # Assumes you have "build": "tsc" in your package.json

      # Step A: Tell GitHub we are using Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step B: Upload the 'dist' folder as a web artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # Ensure this matches your tsconfig outDir

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Step C: Deploy the artifact directly to the web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
