name: TypeScript CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Or your preferred version
          cache: 'npm'       # Speeds up future runs by caching node_modules

      - name: Install dependencies
        run: npm ci          # 'npm ci' is faster and more reliable than 'npm install' in CI

      - name: Type Check
        run: npx tsc --noEmit # Checks for errors without creating files

      - name: Build
        run: npm run build    # Assumes you have "build": "tsc" in your package.json

      # This step takes your 'dist' folder and puts it on the web
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # The folder your build script generates
          branch: gh-pages # The branch the site will live on